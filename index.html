<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: aqua;
            font-family: sans-serif;
            font-size: large;
        }
        
        .importante{
            color: red;
        }

         #meu-cabecalho {
            background-color: lightblue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        div p{
            text-align: right;
        }

        .justifica.texto{
            text-align: justify;
        }
    </style>
</head>
<body>
    <div id="meu-cabecalho">Seletor de id</div>
    <p class="importante">Seletor de classe</p>
    <div>
        <p>Seletor de descendente</p>
    </div>
    <p class="justifica texto">Seletor de classe combinado</p>
</body>
</html>
